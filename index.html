<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6b4fa0" id="themeColorMeta">
  <!-- PWA notification bar color - light and dark -->
  <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
  <meta name="description" content="R/a/dio dan Listen.moe">
  <meta name="apple-mobile-web-app-title" content="myRadio">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>myRadio</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:         #1a1a1a;
      --paper:       #faf9f7;
      --mist:        #f0ede8;
      --smoke:       #d8d3cc;
      --dim:         #8a8278;
      --violet:      #6b4fa0;
      --violet-mid:  #9070c8;
      --violet-pale: #ede8f8;
      --green:       #6db872;
      --red:         #e05c5c;
      --font-serif:  "Fraunces", Georgia, serif;
      --font-sans:   "Plus Jakarta Sans", system-ui, sans-serif;
      --t: 0.3s ease;
      --app-h: calc(var(--vh, 1vh) * 100);
    }
    [data-theme="dark"] {
      --ink:         #e8e4de;
      --paper:       #141210;
      --mist:        #1e1b18;
      --smoke:       #3a3530;
      --dim:         #7a7268;
      --violet:      #b39ddb;
      --violet-mid:  #c8b0f0;
      --violet-pale: #2a2040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    body { user-select: none; -webkit-user-select: none; }
    /* Disable long-press context menu (klik tahan) */
    img { -webkit-user-drag: none; pointer-events: none; }
    .ascii-img { pointer-events: none; }

    html, body {
      width: 100%; height: var(--app-h); max-height: var(--app-h);
      overflow: hidden; overscroll-behavior: none;
      background: var(--paper); color: var(--ink);
      font-family: var(--font-sans); font-weight: 300;
      transition: background var(--t), color var(--t);
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ── App shell: 5 rows ── */
    .app {
      position: relative; z-index: 1;
      width: 100%; height: var(--app-h);
      display: grid;
      grid-template-rows: auto 1fr auto auto auto;
      padding: 12px 14px;
      padding-top:    max(12px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      gap: 10px;
      overflow: hidden;
    }

    /* ── Header ── */
    .topbar {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-shrink: 0;
      animation: fadeDown 0.5s ease both;
    }
    .brand-label {
      font-size: 0.55rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--violet);
    }
    .brand-title {
      font-family: var(--font-serif);
      font-size: clamp(1.1rem, 5.5vw, 1.6rem);
      font-weight: 400; letter-spacing: -0.02em;
      color: var(--ink); transition: color var(--t); line-height: 1; margin: 1px 0;
    }
    .brand-subtitle {
      font-size: 0.58rem; color: var(--dim);
      letter-spacing: 0.03em; font-weight: 300; transition: color var(--t);
    }
    .theme-toggle {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--mist); border: 1px solid var(--smoke);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: background var(--t), border-color var(--t), transform 0.15s;
      flex-shrink: 0; margin-top: 2px;
    }
    .theme-toggle:active { transform: scale(0.88); }
    .icon-dark  { display: none; }
    .icon-light { display: block; }
    [data-theme="dark"] .icon-dark  { display: block; }
    [data-theme="dark"] .icon-light { display: none; }

    /* ── ASCII art: full width, 1fr ── */
    .ascii-wrap {
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--smoke);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: border-color var(--t);
      animation: fadeUp 0.5s ease 0.05s both;
    }
    .ascii-img {
      width: 100%; height: 100%;
      display: block; object-fit: cover; object-position: center;
      pointer-events: none;        /* disable tap/long-press context menu */
      -webkit-user-drag: none;     /* disable drag */
      -webkit-touch-callout: none; /* disable iOS callout */
    }

    /* Info panel: two cards side by side, auto height */
    .info-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      animation: fadeUp 0.5s ease 0.08s both;
    }

    /* ── Info card (now playing) ── */
    .info-card {
      flex: 1;
      background: var(--mist);
      border: 1px solid var(--smoke);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 3px;
      min-height: 0; overflow: hidden;
      transition: border-color var(--t), background var(--t);
    }
    .info-card.active {
      border-color: var(--violet-mid);
      box-shadow: 0 0 0 2px var(--violet-pale);
    }
    .info-station {
      display: flex; align-items: center; justify-content: space-between;
    }
    .info-name {
      font-family: var(--font-serif);
      font-size: clamp(0.72rem, 2.5vw, 0.88rem);
      font-weight: 400; color: var(--ink); transition: color var(--t);
      line-height: 1;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; color: var(--violet); opacity: 0.65;
      transition: opacity 0.2s, transform 0.15s;
      padding: 0; line-height: 1; flex-shrink: 0;
    }
    .copy-btn:active { transform: scale(0.85); opacity: 1; }
    .copy-btn.copied { color: var(--green); opacity: 1; }

    /* Song title: marquee if overflow */
    .info-song {
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      font-weight: 400; color: var(--ink);
      transition: color var(--t);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; line-height: 1.3;
    }
    .info-song.marquee { animation: marquee 12s linear infinite; }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-60%); }
    }

    .info-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 4px;
    }
    .info-dj {
      font-size: clamp(0.55rem, 1.8vw, 0.65rem);
      color: var(--dim); transition: color var(--t);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .info-listeners {
      font-size: 0.55rem; color: var(--violet);
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Players ── */
    .players {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; flex-shrink: 0;
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .player-card {
      background: var(--mist); border: 1px solid var(--smoke);
      border-radius: 12px; padding: 9px 11px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color var(--t), box-shadow var(--t), background var(--t);
    }
    .player-card.playing {
      border-color: var(--violet-mid);
      box-shadow: 0 0 0 2px var(--violet-pale);
    }
    .player-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 4px;
    }
    .player-name {
      font-family: var(--font-serif);
      font-size: clamp(0.78rem, 2.8vw, 0.95rem);
      font-weight: 400; color: var(--ink); transition: color var(--t); line-height: 1.1;
    }
    .player-link {
      font-size: 0.55rem; color: var(--violet);
      text-decoration: none; opacity: 0.65; transition: opacity 0.2s; flex-shrink: 0;
    }
    .player-link:hover { opacity: 1; }
    .status {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.58rem; color: var(--dim); transition: color var(--t);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--smoke); transition: background 0.3s; flex-shrink: 0;
    }
    .dot.live  { background: var(--green); animation: pulse 2s ease infinite; }
    .dot.error { background: var(--red); }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.75); }
    }
    .player-controls { display: flex; align-items: center; gap: 8px; }
    .play-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--ink); color: var(--paper);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .play-btn:active { transform: scale(0.88); }
    .play-btn.playing { background: var(--violet); }
    .play-btn svg { width: 13px; height: 13px; fill: currentColor; }
    .volume-wrap { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0; }
    .vol-icon { font-size: 0.68rem; color: var(--dim); flex-shrink: 0; }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px; background: var(--smoke);
      border-radius: 99px; outline: none; cursor: pointer;
      transition: background var(--t); min-width: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: var(--violet); cursor: pointer; transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); }

    /* ── Footer ── */
    .footer {
      text-align: center; font-family: var(--font-serif); font-style: italic;
      font-size: 0.58rem; color: var(--dim);
      letter-spacing: 0.02em; transition: color var(--t);
      animation: fadeUp 0.5s ease 0.2s both;
    }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #6b4fa0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #splash.hide { opacity: 0; visibility: hidden; }
    #splash-title {
      font-family: "Fraunces", Georgia, serif;
      font-size: 2rem; font-weight: 400;
      color: #faf9f7; letter-spacing: -0.02em;
    }
    #splash-sub {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      font-size: 0.6rem; font-weight: 300;
      color: rgba(250,249,247,0.55); letter-spacing: 0.2em; text-transform: uppercase;
    }
    #splash-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(250,249,247,0.4); margin-top: 6px;
      animation: splashPulse 1s ease infinite;
    }
    @keyframes splashPulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50%      { transform: scale(1.5); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div id="splash-title">myRadio</div>
  <div id="splash-sub">Direct Stream Radio</div>
  <div id="splash-dot"></div>
</div>

<div class="app">

  <!-- Header -->
  <header class="topbar">
    <div>
      <div class="brand-label">myRadio</div>
      <div class="brand-title">Radio</div>
      <div class="brand-subtitle">Direct Stream Radio</div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle tema">
      <span class="icon-light">🌙</span>
      <span class="icon-dark">☀️</span>
    </button>
  </header>

  <!-- ASCII Art: full width -->
  <div class="ascii-wrap">
    <img class="ascii-img" id="asciiImg"
      src="https://i.ibb.co.com/p6Z6GqB2/ascii-art.png" alt="ascii art">
  </div>

  <!-- Info panel: side by side -->
  <div class="info-panel">

    <!-- r/a/dio info -->
    <div class="info-card" id="info-card-rad">
      <div class="info-station">
        <span class="info-name">r/a/dio</span>
        <button class="copy-btn" id="copy-rad" onclick="copyNowPlaying('rad')" title="Salin judul lagu">⎘</button>
      </div>
      <div class="info-song" id="np-rad-song">—</div>
      <div class="info-row">
        <span class="info-dj" id="np-rad-dj">DJ: —</span>
        <span class="info-listeners" id="np-rad-listeners"></span>
      </div>
    </div>

    <!-- listen.moe info -->
    <div class="info-card" id="info-card-lmoe">
      <div class="info-station">
        <span class="info-name">listen.moe</span>
        <button class="copy-btn" id="copy-lmoe" onclick="copyNowPlaying('lmoe')" title="Salin judul lagu">⎘</button>
      </div>
      <div class="info-song" id="np-lmoe-song">—</div>
      <div class="info-row">
        <span class="info-dj" id="np-lmoe-artist">Artis: —</span>
        <span class="info-listeners" id="np-lmoe-listeners"></span>
      </div>
    </div>

  </div>

  <!-- Players -->
  <div class="players">

    <!-- r/a/dio player -->
    <div class="player-card" id="card-rad">
      <div class="player-top">
        <span class="player-name">r/a/dio</span>
        <a class="player-link" href="https://r-a-d.io/" target="_blank" rel="noopener">↗</a>
      </div>
      <div class="status">
        <span class="dot" id="dot-rad"></span>
        <span id="status-rad">siap</span>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="btn-rad" onclick="togglePlay('rad')" aria-label="Play r/a/dio">
          <svg id="icon-rad" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon">🔈</span>
          <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('rad',this.value)">
        </div>
      </div>
      <audio id="audio-rad" preload="none"></audio>
    </div>

    <!-- listen.moe player -->
    <div class="player-card" id="card-lmoe">
      <div class="player-top">
        <span class="player-name">listen.moe</span>
        <a class="player-link" href="https://listen.moe/" target="_blank" rel="noopener">↗</a>
      </div>
      <div class="status">
        <span class="dot" id="dot-lmoe"></span>
        <span id="status-lmoe">siap</span>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="btn-lmoe" onclick="togglePlay('lmoe')" aria-label="Play listen.moe">
          <svg id="icon-lmoe" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon">🔈</span>
          <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('lmoe',this.value)">
        </div>
      </div>
      <audio id="audio-lmoe" preload="none"></audio>
    </div>

  </div>

  <footer class="footer">📻 myRadio · Made with love for Personal Use</footer>
</div>

<script>
  // ── VH Fix ──
  function setVH() {
    document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
  }
  setVH();
  window.addEventListener('resize', setVH);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) setVH(); });
  window.addEventListener('pageshow', setVH);
  window.addEventListener('focus', setVH);

  // ── Prevent pinch zoom & pull-to-refresh ──
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  // Disable right-click / long-press context menu
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Disable context menu (long press) on seluruh halaman
  document.addEventListener('contextmenu', e => e.preventDefault());

  // ── Splash ──
  const splash = document.getElementById('splash');
  window.addEventListener('load', () => setTimeout(() => splash.classList.add('hide'), 600));
  setTimeout(() => splash.classList.add('hide'), 1800);

  // ── Constants ──
  const ASCII_LIGHT  = 'https://i.ibb.co.com/p6Z6GqB2/ascii-art.png';
  const ASCII_DARK   = 'https://i.ibb.co.com/FbCYM72m/image.png';
  const PHOTO_ICON   = 'https://i.ibb.co.com/S46QmdPZ/IMG-20260221-145750.jpg';
  const RAD_STREAMS  = [
    'https://relay1.r-a-d.io/main.mp3',
    'https://relay0.r-a-d.io/main.mp3',
    'https://relay2.r-a-d.io/main.mp3'
  ];
  const LMOE_STREAMS = ['https://listen.moe/stream', 'https://listen.moe/fallback'];
  const PLAY   = '<path d="M8 5v14l11-7z"/>';
  const PAUSE  = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  const STATIONS = ['rad', 'lmoe'];
  const $        = id => document.getElementById(id);

  let radIdx = 0, lmoeIdx = 0;

  // ── Now Playing state ──
  const nowPlaying = {
    rad:  { song: '', dj: '', listeners: 0 },
    lmoe: { song: '', artist: '', listeners: 0 }
  };

  // ── Theme ──
  const root          = document.documentElement;
  const toggleBtn     = document.getElementById('themeToggle');
  const asciiImg      = document.getElementById('asciiImg');
  const themeColorMeta= document.getElementById('themeColorMeta');
  let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedTheme    = localStorage.getItem('myradio-theme');
  if (savedTheme) isDark = savedTheme === 'dark';

  function applyTheme(dark) {
    isDark = dark;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    asciiImg.src = dark ? ASCII_DARK : ASCII_LIGHT;
    themeColorMeta.setAttribute('content', dark ? '#141210' : '#6b4fa0');
    localStorage.setItem('myradio-theme', dark ? 'dark' : 'light');
  }
  applyTheme(isDark);
  toggleBtn.addEventListener('click', () => applyTheme(!isDark));

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () =>
      navigator.serviceWorker.register('./sw.js').catch(() => {})
    );
  }

  // ── Helpers ──
  function truncate(str, max) {
    return str && str.length > max ? str.slice(0, max) + '…' : str;
  }

  // ── Copy Now Playing to clipboard ──
  function copyNowPlaying(id) {
    const np   = nowPlaying[id];
    const btn  = document.getElementById('copy-' + id);
    let   text = '';

    if (id === 'rad') {
      text = np.song ? `${np.song}${np.dj ? ' — DJ: ' + np.dj : ''}` : '';
    } else {
      text = np.song ? `${np.song}${np.artist ? ' — ' + np.artist : ''}` : '';
    }

    if (!text) {
      // Belum ada info, kasih feedback
      btn.textContent = '?';
      setTimeout(() => { btn.textContent = '⎘'; btn.classList.remove('copied'); }, 1200);
      return;
    }

    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '⎘';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback untuk browser lama (Android 7)
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '⎘';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── r/a/dio API (polling setiap 10 detik) ──
  async function fetchRadAPI() {
    try {
      const res  = await fetch('https://r-a-d.io/api');
      const data = await res.json();
      const main = data.main;

      nowPlaying.rad.song      = main.np       || '';
      nowPlaying.rad.dj        = main.dj ? main.dj.djname : 'AutoDJ';
      nowPlaying.rad.listeners = main.listeners || 0;

      $('np-rad-song').textContent      = nowPlaying.rad.song || '—';
      $('np-rad-dj').textContent        = 'DJ: ' + nowPlaying.rad.dj;
      $('np-rad-listeners').textContent = nowPlaying.rad.listeners
        ? '👥 ' + nowPlaying.rad.listeners : '';

      // Update mediaSession kalau lagi main
      if (!$('audio-rad').paused) updateMediaSession('rad');

    } catch (_) { /* silent fail */ }
  }
  fetchRadAPI();
  setInterval(fetchRadAPI, 10000);

  // ── listen.moe WebSocket ──
  let lmoeWS       = null;
  let lmoeHBTimer  = null;
  let lmoeReconTimer = null;

  function connectLmoeWS() {
    if (lmoeWS && lmoeWS.readyState < 2) return; // already open/connecting

    lmoeWS = new WebSocket('wss://listen.moe/gateway_v2');

    lmoeWS.onopen = () => {
      clearTimeout(lmoeReconTimer);
      // Identify
      lmoeWS.send(JSON.stringify({ op: 0, d: { auth: null } }));
    };

    lmoeWS.onmessage = msg => {
      let data;
      try { data = JSON.parse(msg.data); } catch { return; }

      // Hello: server kirim heartbeat interval
      if (data.op === 0) {
        const interval = data.d?.heartbeat || 35000;
        clearInterval(lmoeHBTimer);
        lmoeHBTimer = setInterval(() => {
          if (lmoeWS.readyState === 1)
            lmoeWS.send(JSON.stringify({ op: 9 }));
        }, interval);
      }

      // Track update
      if ((data.op === 1 && data.t === 'TRACK_UPDATE') ||
          (data.op === 1 && data.t === 'TRACK_UPDATE_REQUEST') ||
          (data.op === 0 && data.t === 'LISTEN_STATS')) {

        if (data.d?.song) {
          const song = data.d.song;
          nowPlaying.lmoe.song   = song.titleRomaji || song.title || '';
          nowPlaying.lmoe.artist = song.artists
            ? song.artists.map(a => a.nameRomaji || a.name).filter(Boolean).join(', ')
            : '';
        }
        if (data.d?.listeners !== undefined) {
          nowPlaying.lmoe.listeners = data.d.listeners;
        }

        $('np-lmoe-song').textContent    = nowPlaying.lmoe.song   || '—';
        $('np-lmoe-artist').textContent  = nowPlaying.lmoe.artist
          ? 'Artis: ' + nowPlaying.lmoe.artist : 'Artis: —';
        $('np-lmoe-listeners').textContent = nowPlaying.lmoe.listeners
          ? '👥 ' + nowPlaying.lmoe.listeners : '';

        // Update mediaSession kalau lagi main
        if (!$('audio-lmoe').paused) updateMediaSession('lmoe');
      }
    };

    lmoeWS.onclose = () => {
      clearInterval(lmoeHBTimer);
      // Reconnect setelah 5 detik
      lmoeReconTimer = setTimeout(connectLmoeWS, 5000);
    };

    lmoeWS.onerror = () => {
      lmoeWS.close();
    };
  }
  connectLmoeWS();

  // Reconnect WS saat app di-foreground lagi
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      fetchRadAPI();
      connectLmoeWS();
    }
  });

  // ── Player Logic ──
  function stopOthers(id) {
    STATIONS.forEach(o => {
      if (o === id) return;
      const a = $('audio-' + o);
      if (!a.paused) { a.pause(); setStopped(o); }
    });
  }
  function setPlaying(id) {
    $('icon-'   + id).innerHTML = PAUSE;
    $('btn-'    + id).classList.add('playing');
    $('dot-'    + id).classList.add('live');
    $('dot-'    + id).classList.remove('error');
    $('status-' + id).textContent = 'live ●';
    $('card-'   + id).classList.add('playing');
    $('info-card-' + id).classList.add('active');
  }
  function setStopped(id) {
    $('icon-'   + id).innerHTML = PLAY;
    $('btn-'    + id).classList.remove('playing');
    $('dot-'    + id).classList.remove('live', 'error');
    $('status-' + id).textContent = 'siap';
    $('card-'   + id).classList.remove('playing');
    $('info-card-' + id).classList.remove('active');
  }
  function setError(id, msg) {
    setStopped(id);
    $('dot-'    + id).classList.add('error');
    $('status-' + id).textContent = msg || 'gagal';
  }
  function tryStream(id, streams, idx) {
    const audio = $('audio-' + id);
    if (idx >= streams.length) { setError(id, 'semua gagal'); return; }
    $('status-' + id).textContent = idx === 0 ? 'connecting…' : `retry ${idx}…`;
    audio.src = streams[idx];
    audio.load();
    audio.play()
      .then(() => {
        setPlaying(id);
        localStorage.setItem('myradio-station', id);
        if (id === 'rad')  radIdx  = idx;
        if (id === 'lmoe') lmoeIdx = idx;
      })
      .catch(() => tryStream(id, streams, idx + 1));
  }
  function togglePlay(id) {
    const audio = $('audio-' + id);
    stopOthers(id);
    if (!audio.paused) { audio.pause(); setStopped(id); return; }
    const streams = id === 'rad' ? RAD_STREAMS : LMOE_STREAMS;
    tryStream(id, streams, 0);
  }
  function setVolume(id, val) { $('audio-' + id).volume = parseFloat(val); }

  function switchToStation(id) {
    stopOthers(id);
    if ($('audio-' + id).paused) {
      const streams = id === 'rad' ? RAD_STREAMS : LMOE_STREAMS;
      tryStream(id, streams, 0);
    }
  }

  // ── Media Session ──
  function updateMediaSession(id) {
    if (!('mediaSession' in navigator)) return;

    const np = nowPlaying[id];
    let title, artist;

    if (id === 'rad') {
      title  = np.song || 'r/a/dio';
      artist = np.dj   ? 'DJ: ' + np.dj : 'r/a/dio';
    } else {
      title  = np.song   || 'listen.moe';
      artist = np.artist || 'listen.moe';
    }

    navigator.mediaSession.metadata = new MediaMetadata({
      title,
      artist,
      album:   'myRadio',
      artwork: [
        { src: PHOTO_ICON, sizes: '512x512', type: 'image/jpeg' },
        { src: PHOTO_ICON, sizes: '192x192', type: 'image/jpeg' }
      ]
    });

    navigator.mediaSession.setActionHandler('play',  () => { if ($('audio-'+id).paused) togglePlay(id); });
    navigator.mediaSession.setActionHandler('pause', () => { if (!$('audio-'+id).paused) { $('audio-'+id).pause(); setStopped(id); } });
    navigator.mediaSession.setActionHandler('stop',  () => { if (!$('audio-'+id).paused) { $('audio-'+id).pause(); setStopped(id); } });

    const idx  = STATIONS.indexOf(id);
    const next = STATIONS[(idx + 1) % STATIONS.length];
    const prev = STATIONS[(idx - 1 + STATIONS.length) % STATIONS.length];
    navigator.mediaSession.setActionHandler('nexttrack',     () => switchToStation(next));
    navigator.mediaSession.setActionHandler('previoustrack', () => switchToStation(prev));
  }

  // ── Audio event listeners ──
  STATIONS.forEach(id => {
    const audio   = $('audio-' + id);
    const streams = id === 'rad' ? RAD_STREAMS : LMOE_STREAMS;
    const getIdx  = () => id === 'rad' ? radIdx : lmoeIdx;

    audio.addEventListener('error', () => {
      if (audio.paused) return;
      tryStream(id, streams, getIdx() + 1);
    });
    audio.addEventListener('playing', () => {
      setPlaying(id);
      updateMediaSession(id);
      if ('mediaSession' in navigator)
        navigator.mediaSession.playbackState = 'playing';
    });
    audio.addEventListener('pause', () => {
      if ('mediaSession' in navigator)
        navigator.mediaSession.playbackState = 'paused';
    });
    audio.addEventListener('stalled', () => {
      if (!audio.paused) $('status-' + id).textContent = 'buffering…';
    });
  });
</script>
