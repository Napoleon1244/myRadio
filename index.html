<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="R/a/dio dan Listen.moe">
  <meta name="apple-mobile-web-app-title" content="myRadio">
  <title>myRadio</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:         #1a1a1a;
      --paper:       #faf9f7;
      --mist:        #f0ede8;
      --smoke:       #d8d3cc;
      --dim:         #8a8278;
      --violet:      #6b4fa0;
      --violet-mid:  #9070c8;
      --violet-pale: #ede8f8;
      --font-serif:  "Fraunces", Georgia, serif;
      --font-sans:   "Plus Jakarta Sans", system-ui, sans-serif;
      --t: 0.3s ease;
      /* --vh di-set oleh JS, fallback ke 1vh */
      --app-h: calc(var(--vh, 1vh) * 100);
    }
    [data-theme="dark"] {
      --ink:         #e8e4de;
      --paper:       #141210;
      --mist:        #1e1b18;
      --smoke:       #3a3530;
      --dim:         #7a7268;
      --violet:      #b39ddb;
      --violet-mid:  #c8b0f0;
      --violet-pale: #2a2040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: var(--app-h);
      max-height: var(--app-h);
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 300;
      transition: background var(--t), color var(--t);
    }

    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .app {
      position: relative; z-index: 1;
      width: 100%;
      height: var(--app-h);
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: 14px 14px;
      padding-top:    max(14px, env(safe-area-inset-top));
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      gap: 12px;
      overflow: hidden;
    }

    /* ── Header ── */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
      animation: fadeDown 0.5s ease both;
    }
    .brand-label {
      font-size: 0.56rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--violet);
    }
    .brand-title {
      font-family: var(--font-serif);
      font-size: clamp(1.2rem, 6vw, 1.7rem);
      font-weight: 400; letter-spacing: -0.02em;
      color: var(--ink); transition: color var(--t); line-height: 1;
      margin: 1px 0;
    }
    .brand-subtitle {
      font-size: 0.6rem; color: var(--dim);
      letter-spacing: 0.03em; font-weight: 300;
      transition: color var(--t);
    }
    .theme-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--mist); border: 1px solid var(--smoke);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      transition: background var(--t), border-color var(--t), transform 0.15s;
      flex-shrink: 0; margin-top: 2px;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:active { transform: scale(0.88); }
    .icon-dark  { display: none; }
    .icon-light { display: block; }
    [data-theme="dark"] .icon-dark  { display: block; }
    [data-theme="dark"] .icon-light { display: none; }

    /* ── ASCII Art ── */
    .ascii-wrap {
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--smoke);
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
      transition: border-color var(--t);
      animation: fadeUp 0.5s ease 0.05s both;
    }
    .ascii-img {
      width: 100%; height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
    }

    /* ── Players ── */
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .player-card {
      background: var(--mist);
      border: 1px solid var(--smoke);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 7px;
      transition: border-color var(--t), box-shadow var(--t), background var(--t);
    }
    .player-card.playing {
      border-color: var(--violet-mid);
      box-shadow: 0 0 0 2px var(--violet-pale);
    }
    .player-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 4px;
    }
    .player-name {
      font-family: var(--font-serif);
      font-size: clamp(0.82rem, 3vw, 1rem);
      font-weight: 400; letter-spacing: -0.01em;
      color: var(--ink); transition: color var(--t); line-height: 1.1;
    }
    .player-link {
      font-size: 0.58rem; color: var(--violet);
      text-decoration: none; opacity: 0.65;
      transition: opacity 0.2s; flex-shrink: 0; margin-top: 1px;
    }
    .player-link:hover { opacity: 1; }
    .status {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.6rem; color: var(--dim); transition: color var(--t);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--smoke); transition: background 0.3s; flex-shrink: 0;
    }
    .dot.live  { background: #6db872; animation: pulse 2s ease infinite; }
    .dot.error { background: #e05c5c; }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.75); }
    }
    .player-controls { display: flex; align-items: center; gap: 8px; }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--ink); color: var(--paper);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .play-btn:active { transform: scale(0.88); }
    .play-btn.playing { background: var(--violet); }
    .play-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .volume-wrap { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0; }
    .vol-icon { font-size: 0.7rem; color: var(--dim); user-select: none; flex-shrink: 0; }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      background: var(--smoke); border-radius: 99px;
      outline: none; cursor: pointer; transition: background var(--t); min-width: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--violet); cursor: pointer; transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-family: var(--font-serif); font-style: italic;
      font-size: 0.6rem; color: var(--dim);
      letter-spacing: 0.02em; transition: color var(--t);
      animation: fadeUp 0.5s ease 0.25s both;
    }

    /* ── Install Banner ── */
    .install-banner {
      display: none;
      position: fixed; bottom: 70px; left: 14px; right: 14px; z-index: 99;
      background: var(--violet-pale);
      border: 1px solid var(--violet-mid);
      border-radius: 8px; padding: 8px 12px;
      align-items: center; justify-content: space-between; gap: 8px;
    }
    .install-banner.show { display: flex; }
    .install-text { font-size: 0.6rem; color: var(--violet); line-height: 1.3; }
    .install-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .install-btn {
      font-size: 0.6rem; font-weight: 500;
      background: var(--violet); color: var(--paper);
      border: none; border-radius: 5px; padding: 4px 8px; cursor: pointer;
    }
    .install-dismiss {
      background: none; border: none; cursor: pointer;
      color: var(--dim); font-size: 0.85rem;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <header class="topbar">
    <div>
      <div class="brand-label">myRadio</div>
      <div class="brand-title">Radio</div>
      <div class="brand-subtitle">Direct Stream Radio</div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle tema">
      <span class="icon-light">🌙</span>
      <span class="icon-dark">☀️</span>
    </button>
  </header>

  <div class="ascii-wrap">
    <img class="ascii-img" id="asciiImg"
      src="https://i.ibb.co.com/p6Z6GqB2/ascii-art.png" alt="ascii art">
  </div>

  <div class="players">
    <div class="player-card" id="card-rad">
      <div class="player-top">
        <span class="player-name">r/a/dio</span>
        <a class="player-link" href="https://r-a-d.io/" target="_blank" rel="noopener">↗</a>
      </div>
      <div class="status">
        <span class="dot" id="dot-rad"></span>
        <span id="status-rad">siap</span>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="btn-rad" onclick="togglePlay('rad')" aria-label="Play r/a/dio">
          <svg id="icon-rad" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon">🔈</span>
          <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('rad',this.value)">
        </div>
      </div>
      <audio id="audio-rad" preload="none"></audio>
    </div>

    <div class="player-card" id="card-lmoe">
      <div class="player-top">
        <span class="player-name">listen.moe</span>
        <a class="player-link" href="https://listen.moe/" target="_blank" rel="noopener">↗</a>
      </div>
      <div class="status">
        <span class="dot" id="dot-lmoe"></span>
        <span id="status-lmoe">siap</span>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="btn-lmoe" onclick="togglePlay('lmoe')" aria-label="Play listen.moe">
          <svg id="icon-lmoe" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="volume-wrap">
          <span class="vol-icon">🔈</span>
          <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume('lmoe',this.value)">
        </div>
      </div>
      <audio id="audio-lmoe" preload="none"></audio>
    </div>
  </div>

  <footer class="footer">R/a/dio dan Listen.moe</footer>
</div>

<div class="install-banner" id="installBanner">
  <span class="install-text">Install myRadio ke home screen!</span>
  <div class="install-actions">
    <button class="install-btn" id="installBtn">Install</button>
    <button class="install-dismiss" id="dismissBtn">✕</button>
  </div>
</div>

<script>
  // ── FIX UTAMA: Dynamic Viewport Height ──
  // Android Chrome berubah tingginya saat address bar muncul/hilang
  // atau pas balik dari tab lain. Kita set manual pakai window.innerHeight.
  function setVH() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }

  // Panggil pertama kali
  setVH();

  // Update saat resize (keyboard muncul, address bar berubah, dll)
  window.addEventListener('resize', setVH);

  // Update saat balik ke tab ini (dari tab r/a/dio atau listen.moe)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) setVH();
  });

  // Update saat page di-restore (back button Android)
  window.addEventListener('pageshow', setVH);
  window.addEventListener('focus', setVH);

  // ── ASCII ──
  const ASCII_LIGHT = 'https://i.ibb.co.com/p6Z6GqB2/ascii-art.png';
  const ASCII_DARK  = 'https://i.ibb.co.com/FbCYM72m/image.png';

  const RAD_STREAMS  = [
    'https://relay1.r-a-d.io/main.mp3',
    'https://relay0.r-a-d.io/main.mp3',
    'https://relay2.r-a-d.io/main.mp3'
  ];
  const LMOE_STREAMS = [
    'https://listen.moe/stream',
    'https://listen.moe/fallback'
  ];

  let radIdx = 0, lmoeIdx = 0;

  // ── Theme ──
  const root      = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  const asciiImg  = document.getElementById('asciiImg');
  let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  function applyTheme(dark) {
    isDark = dark;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    asciiImg.src = dark ? ASCII_DARK : ASCII_LIGHT;
  }
  applyTheme(isDark);
  toggleBtn.addEventListener('click', () => {
    applyTheme(!isDark);
    // Update artwork notifikasi kalau lagi ada yang streaming
    ['rad','lmoe'].forEach(id => {
      const audio = $('audio-' + id);
      if (!audio.paused) updateMediaSession(id);
    });
  });

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () =>
      navigator.serviceWorker.register('./sw.js').catch(() => {})
    );
  }

  // ── PWA Install ──
  let deferredPrompt = null;
  const installBanner = document.getElementById('installBanner');
  const installBtn    = document.getElementById('installBtn');
  const dismissBtn    = document.getElementById('dismissBtn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    installBanner.classList.add('show');
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice;
    deferredPrompt = null; installBanner.classList.remove('show');
  });
  dismissBtn.addEventListener('click', () => installBanner.classList.remove('show'));
  window.addEventListener('appinstalled', () => installBanner.classList.remove('show'));

  // ── Player Logic ──
  const PLAY  = '<path d="M8 5v14l11-7z"/>';
  const PAUSE = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  const $     = id => document.getElementById(id);

  function stopOthers(id) {
    ['rad','lmoe'].forEach(o => {
      if (o === id) return;
      const a = $('audio-' + o);
      if (!a.paused) { a.pause(); setStopped(o); }
    });
  }
  function setPlaying(id) {
    $('icon-'  + id).innerHTML = PAUSE;
    $('btn-'   + id).classList.add('playing');
    $('dot-'   + id).classList.add('live');
    $('dot-'   + id).classList.remove('error');
    $('status-'+ id).textContent = 'live ●';
    $('card-'  + id).classList.add('playing');
  }
  function setStopped(id) {
    $('icon-'  + id).innerHTML = PLAY;
    $('btn-'   + id).classList.remove('playing');
    $('dot-'   + id).classList.remove('live','error');
    $('status-'+ id).textContent = 'siap';
    $('card-'  + id).classList.remove('playing');
  }
  function setError(id, msg) {
    setStopped(id);
    $('dot-'   + id).classList.add('error');
    $('status-'+ id).textContent = msg || 'gagal';
  }
  function tryStream(id, streams, idx) {
    const audio = $('audio-' + id);
    if (idx >= streams.length) { setError(id, 'semua gagal'); return; }
    $('status-' + id).textContent = idx === 0 ? 'connecting…' : `retry ${idx}…`;
    audio.src = streams[idx];
    audio.load();
    audio.play()
      .then(() => {
        setPlaying(id);
        if (id === 'rad')  radIdx  = idx;
        if (id === 'lmoe') lmoeIdx = idx;
      })
      .catch(() => tryStream(id, streams, idx + 1));
  }
  function togglePlay(id) {
    const audio = $('audio-' + id);
    stopOthers(id);
    if (!audio.paused) { audio.pause(); setStopped(id); return; }
    const streams = id === 'rad' ? RAD_STREAMS : LMOE_STREAMS;
    tryStream(id, streams, 0);
  }
  function setVolume(id, val) { $('audio-' + id).volume = parseFloat(val); }

  // ── Media Session API ──
  // Nampilin info + tombol play/pause di notification bar Android
  const STATION_META = {
    rad: {
      title:  'r/a/dio',
      artist: 'Direct Stream Radio',
      album:  'myRadio'
    },
    lmoe: {
      title:  'listen.moe',
      artist: 'Direct Stream Radio',
      album:  'myRadio'
    }
  };

  // Artwork dinamis ikutin tema yang aktif
  const getArtwork = () => [
    { src: isDark ? ASCII_DARK : ASCII_LIGHT, sizes: '512x512', type: 'image/png' }
  ];

  function updateMediaSession(id) {
    if (!('mediaSession' in navigator)) return;

    const meta = STATION_META[id];
    navigator.mediaSession.metadata = new MediaMetadata({
      title:   meta.title,
      artist:  meta.artist,
      album:   meta.album,
      artwork: getArtwork()
    });

    // Tombol play/pause di notification bar
    navigator.mediaSession.setActionHandler('play', () => {
      const audio = $('audio-' + id);
      if (audio.paused) togglePlay(id);
    });
    navigator.mediaSession.setActionHandler('pause', () => {
      const audio = $('audio-' + id);
      if (!audio.paused) { audio.pause(); setStopped(id); }
    });
    // Stop (swipe dismiss notifikasi di beberapa Android)
    navigator.mediaSession.setActionHandler('stop', () => {
      const audio = $('audio-' + id);
      if (!audio.paused) { audio.pause(); setStopped(id); }
    });
    // Disable tombol next/prev karena ini radio, bukan playlist
    navigator.mediaSession.setActionHandler('nexttrack',     null);
    navigator.mediaSession.setActionHandler('previoustrack', null);
  }

  function clearMediaSession() {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = null;
    navigator.mediaSession.playbackState = 'none';
  }

  ['rad','lmoe'].forEach(id => {
    const audio   = $('audio-' + id);
    const streams = id === 'rad' ? RAD_STREAMS : LMOE_STREAMS;
    const getIdx  = () => id === 'rad' ? radIdx : lmoeIdx;

    audio.addEventListener('error', () => {
      if (audio.paused) return;
      tryStream(id, streams, getIdx() + 1);
    });

    audio.addEventListener('playing', () => {
      setPlaying(id);
      updateMediaSession(id);
      if ('mediaSession' in navigator)
        navigator.mediaSession.playbackState = 'playing';
    });

    audio.addEventListener('pause', () => {
      if ('mediaSession' in navigator)
        navigator.mediaSession.playbackState = 'paused';
    });

    audio.addEventListener('stalled', () => {
      if (!audio.paused) $('status-' + id).textContent = 'buffering…';
    });
  });
</script>
</body>
</html>
